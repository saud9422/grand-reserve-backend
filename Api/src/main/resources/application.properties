# ===================================================================
# 1. APPLICATION DETAILS
# ===================================================================
spring.application.name=GrandReserve-Api
server.port=8080

# ===================================================================
# 2. MYSQL DATABASE CONFIGURATION
# ===================================================================
# Replace 'booking_db' with the exact name of the schema you created in MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/core?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# Replace 'root' with your actual MySQL username
spring.datasource.username=root
# Replace 'your_password' with your actual MySQL password
spring.datasource.password=786313
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# 3. HIBERNATE / JPA CONFIGURATION
# ===================================================================
# 'update' will automatically create or update database tables based on your Java Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Show SQL queries in the console (Great for debugging during development)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# 4. CUSTOM JWT SECURITY CONFIGURATION
# ===================================================================
# Prevent Open EntityManager in View (explicitly configured to silence warning).
# Set to 'false' to avoid allowing lazy-loading during view rendering.
spring.jpa.open-in-view=false
# This key must be a secret, alphanumeric string of at least 256 bits (32 characters long)
app.jwt.secret=hello@543535
# Token validity duration in milliseconds (86400000 ms = 24 hours)
app.jwt.expiration-milliseconds=86400000